services:
  bot:
    build: .
    ports:
      - "${PORT:-8080}:8080"
    environment:
      PORT: ${PORT:-8080}
      GITHUB_APP_ID: ${GITHUB_APP_ID}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET}
      GITHUB_PRIVATE_KEY_PATH: /run/secrets/app-key.pem
      COMMENT_MESSAGE: ${COMMENT_MESSAGE:-}
    volumes:
      - ${GITHUB_PRIVATE_KEY_PATH}:/run/secrets/app-key.pem:ro
    restart: unless-stopped

networks:
  default:
    external: true
    name: npm-network